name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_community: yes
          plugin_followup: yes
          plugin_gists: yes
          plugin_habits: yes
          plugin_lines: yes
          plugin_music: yes
          plugin_notable: yes
          plugin_posts: yes
          plugin_stars: yes
          plugin_topics: yes
          plugin_traffic: yes
          plugin_wakatime: yes
          plugin_twitter: yes
          plugin_anilist: yes
          plugin_music_spotify: yes
          config_order: base,habits,community,followup,lines,posts,stars,topics,notable,gists,traffic,wakatime,music,anilist,twitter
          template_dark: beta
          template: terminal
          base_color: "FF006E"
          accent_color: "8338EC"
          accent_light: "3A86FF"
